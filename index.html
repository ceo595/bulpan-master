<script>
(function(){
"use strict";
let W=920, H=680;   // 방향에 따라 가변 (가로 920x680 / 세로 760x1280)
const cv=document.getElementById('game');
const ctx=cv.getContext('2d');

/* ---------- 유틸 ---------- */
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
// 고정(결정적) 유사난수 — 고기 무늬가 프레임마다 떨리지 않도록
function pr(n){ const x=Math.sin(n*127.1+311.7)*43758.5453; return x-Math.floor(x); }
function prr(n,a,b){ return a+pr(n)*(b-a); }
const now=()=>performance.now();
const dist=(p,z)=>Math.hypot(p.x-z.x,p.y-z.y);
function hx(h){ if(h && h[0]==='#'){h=h.slice(1);return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  const m=(''+h).match(/\d+/g)||[0,0,0]; return [+m[0],+m[1],+m[2]]; }
function mix(c1,c2,t){const a=hx(c1),b=hx(c2);t=clamp(t,0,1);
  return 'rgb('+Math.round(lerp(a[0],b[0],t))+','+Math.round(lerp(a[1],b[1],t))+','+Math.round(lerp(a[2],b[2],t))+')';}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function circle(x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.closePath();}

/* ---------- 사운드 (WebAudio) ---------- */
let AC=null, muted=false, sizzleGain=null, sizzleOn=false, bedEl=null, bedReady=false, bedUnlocked=false;
function initBed(){ if(bedEl || typeof Audio==='undefined') return;   // 옆에 sizzle.mp3 있으면 실제 지글 소리 사용
  const srcs=['sizzle.mp3','sizzle.ogg','sizzle.wav']; let si=0;
  const el=new Audio(); el.loop=true; el.preload='auto';
  const tryNext=()=>{ if(si>=srcs.length) return; el.src=srcs[si++]; try{el.load();}catch(e){} };
  el.addEventListener('canplay',()=>{ bedReady=true; });
  el.addEventListener('error',()=>{ if(si<srcs.length) tryNext(); });
  bedEl=el; tryNext(); }
function ac(){ initBed(); if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)(); initSizzle();}catch(e){AC=null;} }
  if(AC && AC.state==='suspended'){ try{AC.resume();}catch(e){} }
  if(bedEl && !bedUnlocked){ bedUnlocked=true; try{ const pr=bedEl.play(); if(pr&&pr.then) pr.then(()=>bedEl.pause()).catch(()=>{}); else bedEl.pause(); }catch(e){} }
  return AC; }
function beep(freq,dur,type,vol,slideTo){
  if(muted) return; const a=ac(); if(!a) return;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type||'sine'; o.frequency.value=freq;
  if(slideTo){ o.frequency.exponentialRampToValueAtTime(slideTo, a.currentTime+dur); }
  g.gain.value=0.0001; g.gain.exponentialRampToValueAtTime(vol||0.14, a.currentTime+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+dur);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur+0.02);
}
function noiseBurst(dur,vol,hp){
  if(muted) return; const a=ac(); if(!a) return;
  const n=Math.floor(a.sampleRate*dur), buf=a.createBuffer(1,n,a.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,1.5);
  const s=a.createBufferSource(); s.buffer=buf;
  const f=a.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp||1600;
  const g=a.createGain(); g.gain.value=vol||0.09;
  s.connect(f); f.connect(g); g.connect(a.destination); s.start();
}
// 지글지글 연속 사운드 베드
function initSizzle(){
  const a=AC; if(!a||sizzleGain) return;
  sizzleGain=a.createGain(); sizzleGain.gain.value=0;
  const mkbuf=(sec,fn)=>{ const n=Math.floor(a.sampleRate*sec), buf=a.createBuffer(1,n,a.sampleRate), d=buf.getChannelData(0); for(let i=0;i<n;i++) d[i]=fn(i); const s=a.createBufferSource(); s.buffer=buf; s.loop=true; return s; };
  // 지글 레이어(따뜻한 핑크 밴드)
  let b0=0,b1=0,b2=0;
  const sizz=mkbuf(2.6,(i)=>{ const w=Math.random()*2-1; b0=0.99765*b0+w*0.0990460; b1=0.96300*b1+w*0.2965164; b2=0.57000*b2+w*1.0526913; const pink=b0+b1+b2+w*0.1848; const t=i/a.sampleRate; return pink*0.1*(0.86+0.14*Math.sin(t*1.6)); });
  const shp=a.createBiquadFilter(); shp.type='highpass'; shp.frequency.value=850; if(shp.Q) shp.Q.value=0.6;
  const slp=a.createBiquadFilter(); slp.type='lowpass'; slp.frequency.value=6800; if(slp.Q) slp.Q.value=0.5;
  const spk=a.createBiquadFilter(); spk.type='peaking'; spk.frequency.value=3100; if(spk.Q) spk.Q.value=0.7; spk.gain.value=3;
  sizz.connect(shp); shp.connect(slp); slp.connect(spk); spk.connect(sizzleGain);
  // 불판 로어 레이어(저역 웜)
  const roar=mkbuf(2.6,(i)=>{ const t=i/a.sampleRate; return (Math.random()*2-1)*0.06*(0.8+0.2*Math.sin(t*0.9)); });
  const rlp=a.createBiquadFilter(); rlp.type='lowpass'; rlp.frequency.value=360; if(rlp.Q) rlp.Q.value=0.7;
  const rg=a.createGain(); rg.gain.value=0.5;
  roar.connect(rlp); rlp.connect(rg); rg.connect(sizzleGain);
  sizzleGain.connect(a.destination);
  sizz.start(); roar.start();
}
function setSizzle(level){
  if(bedReady && bedEl){                 // 실제 사운드 파일 사용
    if(muted || level<=0){ if(!bedEl.paused){ try{bedEl.pause();}catch(e){} } }
    else { bedEl.volume=Math.min(0.92, 0.28+level*0.6); if(bedEl.paused){ try{ const pr=bedEl.play(); if(pr&&pr.catch) pr.catch(()=>{}); }catch(e){} } }
    if(sizzleGain){ try{ sizzleGain.gain.value=0; }catch(e){} }
    return;
  }
  if(!sizzleGain||!AC) return;
  const t=muted?0:clamp(level,0,1)*0.24;
  try{ sizzleGain.gain.setTargetAtTime(t, AC.currentTime, 0.14); }catch(e){ sizzleGain.gain.value=t; } }
function crackle(){ // 기름 튀는 부드러운 팝 (불규칙)
  if(muted) return; const a=ac(); if(!a) return;
  const n=Math.floor(a.sampleRate*0.025), buf=a.createBuffer(1,n,a.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,3);
  const s=a.createBufferSource(); s.buffer=buf;
  const f=a.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1800+Math.random()*2200; if(f.Q) f.Q.value=0.9;
  const g=a.createGain(); g.gain.value=0.03+Math.random()*0.05;
  s.connect(f); f.connect(g); g.connect(a.destination); s.start();
}
function sizzleBurst(dur,vol,hp){   // "취이익~" 치솟았다 사라지는 지글
  if(muted) return; const a=ac(); if(!a) return;
  const n=Math.floor(a.sampleRate*dur), buf=a.createBuffer(1,n,a.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++){ const t=i/n, env=Math.min(t/0.1,1)*Math.pow(1-t,1.1); d[i]=(Math.random()*2-1)*env; }
  const s=a.createBufferSource(); s.buffer=buf;
  const f=a.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp||1400;
  const lp=a.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=7000;
  const pk=a.createBiquadFilter(); pk.type='peaking'; pk.frequency.value=3000; if(pk.Q) pk.Q.value=0.8; pk.gain.value=4;
  const g=a.createGain(); g.gain.value=vol||0.18;
  s.connect(f); f.connect(lp); lp.connect(pk); pk.connect(g); g.connect(a.destination); s.start();
}
const S={
  place:()=>{ sizzleBurst(0.55,0.2,1500); },   // 치이익~ (고기 올리는 지글)
  flip :()=>{ noiseBurst(0.28,0.13,1400); beep(520,0.1,'triangle',0.08,880); },

  serveOk:()=>{ beep(500,0.12,'sine',0.12,620); },
  burn:()=>{ noiseBurst(0.5,0.14,600); beep(140,0.34,'sawtooth',0.07,80); },
  trash:()=>{ beep(200,0.1,'square',0.08,120); },
  btn :()=>{ beep(440,0.08,'square',0.1,560); },
  win :()=>{ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'sine',0.14),i*120)); },
  lose:()=>{ [400,330,262].forEach((f,i)=>setTimeout(()=>beep(f,0.25,'triangle',0.12,f*0.8),i*160)); }
};

    PLATE ={x:380, y:672,  w:660, h:200};    // 불판 아래 넓은 접시(종류별 여러 줄)
    TRASH ={x:106, y:900,  r:54};
    TRAY  ={x:36,  y:980,  w:688, h:210};    // 맨 아래 큰 재료 바(엄지로 닿게)
    MASCOT={x:656, y:892};
    ISCALE=1.34;                             // 모바일에서 재료 크게
  } else {
    W=920; H=680;
    GRILL ={x:238, y:150, w:446, h:286};
    PLATE ={x:818, y:432, w:168, h:392};
    TRASH ={x:108, y:560, r:56};
    TRAY  ={x:214, y:516, w:492, h:150};
    MASCOT={x:822, y:138};
    ISCALE=1;
  }
  GI={x:GRILL.x+40, y:GRILL.y+44, w:GRILL.w-80, h:GRILL.h-80};
  ADMIN={x:W-166, y:H-38, w:154, h:28};
}
function onGrillArea(x,y){ return x>GRILL.x+8 && x<GRILL.x+GRILL.w-8 && y>GRILL.y+6 && y<GRILL.y+GRILL.h-6; }
function clampToGrill(p){ p.x=clamp(p.x,GI.x,GI.x+GI.w); p.y=clamp(p.y,GI.y,GI.y+GI.h); }
const MAXP=16;

/* ---------- 상태 ---------- */
let state='start';
let levelIdx=0;
let score=0, target=0, timeLeft=0, combo=0, bestCombo=0, burntCount=0;
let pieces=[], drag=null, floats=[], parts=[], buttons=[], plateItems=[], plateCount=0, cookedTypes=[];
let wok=null;                                   // 레벨8 볶음밥 웍 상태
const WFRY_PS=2.4, WFRY_PE=4.8, WBURN=6.6;      // 볶기: 완성 구간 / 탐
let mascot={mood:'idle', t:0, say:'', sayT:0};
let idc=1, introT=0, shake=0, downPt=null;

function newPiece(type,x,y){
  return {id:idc++, type, side:1, d1:0, d2:0, flipped:false, burnt:false,
          x, y, onGrill:false, dragging:false, gdx:0, gdy:0, ox:x, oy:y,
          wasGrill:false, pop:0, serveAnim:0, angle:rand(-0.14,0.14)};
}

/* ---------- 굽기 품질 ---------- */
function sideQuality(d,m){
  const ps=m.perfect[0], pe=m.perfect[1];
  if(d>=m.burnt) return {q:0, burnt:true};
  if(d>pe) return {q:0, over:true};                 // 오버쿡(완벽 구간 지남)
  if(d<ps) return {q: clamp(d/ps,0,1)*0.78, raw:true};
  return {q:1};                                      // 완벽
}
function pieceResult(p){
  const m=MEAT[p.type];
  const s1=sideQuality(p.d1,m);
  const s2=p.flipped? sideQuality(p.d2,m) : {q:0, raw:true};
  if(p.burnt||s1.burnt||s2.burnt) return {burnt:true, over:false, q:0};
  if(s1.over||s2.over) return {burnt:false, over:true, q:0};
  let q=(s1.q+s2.q)/2;
  if(!p.flipped) q=Math.min(q,0.45);
  return {burnt:false, over:false, q};
}

/* ---------- 입력 ---------- */
function pos(e){const r=cv.getBoundingClientRect();return {x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height)};}
function pieceAt(x,y){ const R=46*ISCALE; for(let i=pieces.length-1;i>=0;i--){const p=pieces[i]; if(p.serveAnim>0)continue; if(Math.hypot(x-p.x,y-p.y)<R) return p;} return null; }
function trayHit(p){
  const L=LEVELS[levelIdx], n=L.meats.length, gap=TRAY.w/n;
  const cyc=TRAY.y+(portrait?96:64), rad=portrait?56:40;
  for(let i=0;i<n;i++){ const cx=TRAY.x+gap*(i+0.5); if(Math.hypot(p.x-cx,p.y-cyc)<rad) return L.meats[i]; }
  return null;
}
function onDown(e){
  e.preventDefault(); ac(); const p=pos(e); downPt=p;
  if(Math.hypot(p.x-(W-38),p.y-26)<20){ muted=!muted; setSizzle(0); if(!muted)S.btn(); return; }
  if(state==='play' && p.x>ADMIN.x && p.x<ADMIN.x+ADMIN.w && p.y>ADMIN.y && p.y<ADMIN.y+ADMIN.h){
    S.btn(); if(levelIdx>=LEVELS.length-1) winGame(); else startLevel(levelIdx+1); return; }
  if(state!=='play'){ handleButtons(p); return; }
  if(friedMode()){                                   // 볶음밥: 웍 탭으로 볶기/완성/버리기
    if(onGrillArea(p.x,p.y) && wok && wok.items.length>0){
      if(wok.burnt){ discardWok(); return; }
      if(wokReady()){ serveFriedRice(); return; }
      stirWok(); return;
    }
    const src=trayHit(p);
    if(src){ const np=newPiece(src,p.x,p.y); np.dragging=true; np.pop=1; pieces.push(np); drag=np; }
    return;
  }
  const hit=pieceAt(p.x,p.y);
  if(hit){ drag=hit; hit.dragging=true; hit.gdx=p.x-hit.x; hit.gdy=p.y-hit.y; hit.wasGrill=hit.onGrill; hit.ox=hit.x; hit.oy=hit.y; return; }
  const src=trayHit(p);
  if(src && pieces.length<MAXP){ const np=newPiece(src,p.x,p.y); np.dragging=true; np.pop=1; pieces.push(np); drag=np; }  // 집을 때 무음
}
function onMove(e){ if(!drag) return; e.preventDefault(); const p=pos(e); drag.x=p.x-drag.gdx; drag.y=p.y-drag.gdy; }
function onUp(e){
  if(!drag) return; const p=pos(e); const d=drag; drag=null; d.dragging=false;
  const moved=downPt?Math.hypot(p.x-downPt.x,p.y-downPt.y):99;
  if(friedMode()){                                   // 볶음밥: 웍에 떨어뜨리면 합치기
    if(onGrillArea(p.x,p.y)) addToWok(d.type);
    removePiece(d); return;
  }
  if(Math.abs(p.x-PLATE.x)<PLATE.w/2+16 && Math.abs(p.y-PLATE.y)<PLATE.h/2+16){ serve(d); return; }
  if(dist(p,TRASH)<TRASH.r+12){ trash(d); return; }
  if(onGrillArea(p.x,p.y)){
    if(d.wasGrill && moved<20 && !d.flipped && !d.burnt && d.d1>=1.0){   // 제자리 탭 → 뒤집기
      d.flipped=true; d.side=2; d.onGrill=true; d.x=d.ox; d.y=d.oy; clampToGrill(d); flipFX(d); return;
    }
    d.onGrill=true; d.x=p.x-d.gdx; d.y=p.y-d.gdy; clampToGrill(d); d.ox=d.x; d.oy=d.y;
    return;   // 불판에 올릴 때도 무음 (굽는 지글지글만 유지)
  }
  if(d.wasGrill){ d.onGrill=true; d.x=d.ox; d.y=d.oy; return; }   // 원위치
  removePiece(d);                                                  // 트레이 취소
}
function flipFX(p){ S.flip(); for(let i=0;i<10;i++) parts.push(spark(p.x,p.y,'#ffd98a')); mascot.mood='happy'; mascot.t=0.5; }

function serve(p){
  const r=pieceResult(p), m=MEAT[p.type];
  if(r.burnt || r.over){
    const pen = r.burnt? -Math.round(m.base*0.6) : -Math.round(m.base*0.35);
    score+=pen; combo=0; burntCount++;
    S.burn(); shake=8; mascot.mood='sad'; mascot.t=1.2; say(r.burnt?'앗, 탔어요!':'오버쿡!');
    floats.push({x:PLATE.x,y:PLATE.y-30,txt:(r.burnt?'탄 고기 ':'오버쿡 ')+pen,c:'#d0402e',t:0});
    for(let i=0;i<12;i++) parts.push(smoke(PLATE.x,PLATE.y));
  } else {
    p.plate=true; combo++; bestCombo=Math.max(bestCombo,combo);
    const mult=1+Math.min(combo-1,5)*0.12;
    const pts=Math.round(m.base*r.q*mult);
    score+=pts;
    const perfect=r.q>0.9;
    if(perfect){ S.serveGood(); say('완벽해요!'); } else { S.serveOk(); say('좋아요~'); }
    mascot.mood='happy'; mascot.t=0.9;
    const lbl=(perfect?'완벽! ':'')+'+'+pts+(mult>1?(' x'+(+mult.toFixed(2))):'');
    floats.push({x:PLATE.x,y:PLATE.y-30,txt:lbl,c:perfect?'#2ea86a':'#c9781f',t:0});
    for(let i=0;i<(perfect?16:8);i++) parts.push(spark(PLATE.x,PLATE.y-10, perfect?'#4fd08a':'#ffcf5a'));
  }
  p.serveAnim=0.001; p.sx=p.x; p.sy=p.y;
}
function trash(p){
  if(p.burnt){ S.trash(); say('잘 치웠어요'); mascot.mood='idle'; }
  else { S.trash(); combo=0; say('아까워라…'); }
  for(let i=0;i<6;i++) parts.push(smoke(TRASH.x,TRASH.y-10));
  removePiece(p);
}
function removePiece(p){ pieces=pieces.filter(x=>x.id!==p.id); }
function addPlateItem(type){ const k=plateCount++;
  plateItems.push({type, rot:prr(k*3+1,-0.22,0.22), jx:prr(k*2+3,-12,12)});
  while(plateItems.length>9) plateItems.shift();
  if(cookedTypes.indexOf(type)<0) cookedTypes.push(type); }   // 여태 구운 종류 누적

/* ---------- 파티클 ---------- */
function spark(x,y,c){return {x,y,vx:rand(-70,70),vy:rand(-150,-40),g:230,life:rand(0.4,0.8),t:0,c,r:rand(2,4),kind:'spark'};}
function smoke(x,y){return {x,y,vx:rand(-18,18),vy:rand(-48,-26),g:-6,life:rand(0.7,1.3),t:0,c:'#7d7d7d',r:rand(6,12),kind:'smoke'};}
function steam(x,y){return {x,y,x0:x,vy:rand(-40,-24),life:rand(0.9,1.6),t:0,r:rand(7,13),sw:rand(0.6,1.4),ph:rand(0,6.28),kind:'steam'};}
function sizzP(x,y){return {x,y,vx:rand(-14,14),vy:rand(-30,-10),g:0,life:rand(0.22,0.45),t:0,c:'#fff2cf',r:rand(1.4,3),kind:'spark'};}
function say(t){ mascot.say=t; mascot.sayT=1.4; }

/* ---------- 레벨 흐름 ---------- */
function startLevel(i){
  levelIdx=i; const M=LMETA[i];
  target=M.target; timeLeft=M.time; combo=0; burntCount=0;
  pieces=[]; floats=[]; parts=[]; drag=null; plateItems=[]; plateCount=0;
  wok = (LEVELS[i] && LEVELS[i].mode==='friedrice') ? {items:[], has:{}, fry:0, burnt:false} : null;
  if(i===0){ score=0; cookedTypes=[]; }
  state='intro'; introT=0;
}
function friedMode(){ return !!(LEVELS[levelIdx] && LEVELS[levelIdx].mode==='friedrice'); }
// ===== 볶음밥(조합) 메커닉 =====
function wokCenter(){ return {x:GRILL.x+GRILL.w/2, y:GRILL.y+GRILL.h/2}; }
function wokReady(){ if(!wok) return false; const tops=Object.keys(wok.has).filter(k=>k!=='rice').length;
  return wok.has.rice && tops>=2 && wok.fry>=WFRY_PS && wok.fry<=WFRY_PE && !wok.burnt; }
function addToWok(type){ if(!wok) return; if(wok.burnt) return;
  wok.items.push({type, a:prr(wok.items.length*3+1,0,6.28), rr:prr(wok.items.length*2+5,0.1,1)});
  while(wok.items.length>48) wok.items.shift();
  wok.has[type]=true;
  if(typeof sizzleBurst==='function') sizzleBurst(0.5,0.16,1300);
  const c=wokCenter(); for(let i=0;i<7;i++) parts.push(sizzP(c.x+rand(-34,34),c.y+rand(-18,18)));
  if(type==='rice') say('밥을 볶아요!'); }
function stirWok(){ if(!wok) return; if(!wok.has.rice){ say('흰밥부터 넣어요!'); return; }
  S.flip(); wok.fry+=0.3; const c=wokCenter(); for(let i=0;i<8;i++) parts.push(sizzP(c.x+rand(-40,40),c.y+rand(-18,18))); }
function serveFriedRice(){ if(!wok) return;
  const tops=Object.keys(wok.has).filter(k=>k!=='rice').length;
  const mid=(WFRY_PS+WFRY_PE)/2, half=(WFRY_PE-WFRY_PS)/2;
  const fq=clamp(1-Math.abs((wok.fry-mid)/half)*0.3,0.7,1);
  const pts=Math.round((150+tops*70)*fq);
  score+=pts; combo++; bestCombo=Math.max(bestCombo,combo);
  S.serveGood(); say('볶음밥 완성!'); mascot.mood='happy'; mascot.t=1.0;
  floats.push({x:PLATE.x,y:PLATE.y-30,txt:'볶음밥 +'+pts,c:'#2ea86a',t:0});
  const c=wokCenter(); for(let i=0;i<18;i++) parts.push(spark(c.x,c.y,'#ffcf5a'));
  addPlateItem('friedrice'); resetWok(); }
function resetWok(){ if(wok){ wok.items=[]; wok.has={}; wok.fry=0; wok.burnt=false; } }
function discardWok(){ S.trash(); combo=0; say('아까워라…'); const c=wokCenter(); for(let i=0;i<8;i++) parts.push(smoke(c.x,c.y-10)); resetWok(); }
function onBurnWok(){ S.burn(); say('밥이 타요!'); mascot.mood='sad'; mascot.t=1.0; shake=6; }
function updateWok(dt){
  if(wok && wok.items.length>0 && wok.has.rice && !wok.burnt){
    wok.fry+=dt; const c=wokCenter();
    setSizzle(clamp(0.5+wok.items.length*0.04,0.5,1));
    if(Math.random()<dt*7) crackle();
    if(Math.random()<dt*7) parts.push(sizzP(c.x+rand(-46,46),c.y+rand(-22,22)));
    if(wok.fry>0.8 && Math.random()<dt*4) parts.push(steam(c.x+rand(-34,34),c.y-10));
    if(wok.fry>WFRY_PE && Math.random()<dt*3) parts.push(smoke(c.x+rand(-30,30),c.y-10));
    if(wok.fry>=WBURN){ wok.burnt=true; onBurnWok(); }
  } else setSizzle(0);
}
function drawWokContents(){
  if(!wok) return; const c=wokCenter();
  if(wok.items.length===0){ ctx.fillStyle='#f0dcc2'; ctx.font=(portrait?'20px':'16px')+' Jua,sans-serif'; ctx.textAlign='center';
    ctx.fillText('흰밥과 재료를 웍에 넣어 볶으세요!',c.x,c.y+4); return; }
  const R=Math.min(GRILL.w,GRILL.h)*0.42;
  const riceCol=mix('#fdf6e3', wok.burnt?'#4a3528':'#e9c489', clamp(wok.fry/WBURN,0,1));
  ctx.save(); ctx.translate(c.x,c.y);
  ctx.fillStyle=mix(riceCol,'#000000',0.08); ctx.beginPath(); ctx.ellipse(0,14,R,R*0.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=riceCol; ctx.beginPath(); ctx.ellipse(0,2,R*0.92,R*0.46,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=mix(riceCol,'#ffffff',0.14); ctx.beginPath(); ctx.ellipse(-R*0.15,-6,R*0.6,R*0.32,0,0,Math.PI*2); ctx.fill();
  for(let i=0;i<70;i++){ const a=prr(i*2+1,0,6.28), rr2=prr(i*2+2,0,1); const rx=Math.cos(a)*R*0.84*Math.sqrt(rr2), ry=Math.sin(a)*R*0.42*Math.sqrt(rr2);
    ctx.save(); ctx.translate(rx,ry); ctx.rotate(a); ctx.fillStyle=mix(riceCol,'#ffffff',prr(i+9,0,0.4)); ctx.beginPath(); ctx.ellipse(0,0,3.4,2,0,0,Math.PI*2); ctx.fill(); ctx.restore(); }
  const fc={kimchi:'#d33a1e', gim:'#26302a', roe:'#ff8a2a', cheese:'#ffd24d'};
  wok.items.forEach((it,i)=>{ if(it.type==='rice')return; const col=fc[it.type]||'#c96';
    const a=it.a, rr2=it.rr, rx=Math.cos(a)*R*0.78*Math.sqrt(rr2), ry=Math.sin(a)*R*0.4*Math.sqrt(rr2);
    ctx.fillStyle=col;
    if(it.type==='gim'){ ctx.save(); ctx.translate(rx,ry); ctx.rotate(a); ctx.fillRect(-5,-5,10,10); ctx.restore(); }
    else if(it.type==='roe'){ for(let k=0;k<3;k++){ circle(rx+prr(i*4+k+1,-5,5),ry+prr(i*4+k+2,-4,4),2.1); ctx.fill(); } }
    else if(it.type==='cheese'){ ctx.globalAlpha=0.85; circle(rx,ry,5.5); ctx.fill(); ctx.globalAlpha=1; }
    else { circle(rx,ry,4.6); ctx.fill(); } });
  ctx.restore();
  drawWokGauge(c.x,c.y,R);
}
function drawWokGauge(cx,cy,R){
  const gr=R+18, frac=clamp(wok.fry/WBURN,0,1), ps=WFRY_PS/WBURN, pe=WFRY_PE/WBURN;
  ctx.beginPath(); ctx.arc(cx,cy,gr,-Math.PI/2,-Math.PI/2+Math.PI*2); ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=7; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,gr,-Math.PI/2+Math.PI*2*ps,-Math.PI/2+Math.PI*2*pe); ctx.strokeStyle='rgba(79,208,138,.4)'; ctx.lineWidth=13; ctx.stroke();
  let col='#7fb8e0'; if(frac<ps)col='#7fb8e0'; else if(frac<=pe)col='#4fd08a'; else col=mix('#ffd24d','#ff5a3c',(frac-pe)/(1-pe)); if(wok.burnt)col='#3a3a3a';
  ctx.beginPath(); ctx.arc(cx,cy,gr,-Math.PI/2,-Math.PI/2+Math.PI*2*frac); ctx.strokeStyle=col; ctx.lineWidth=7; ctx.lineCap='round'; ctx.stroke();
  let txt=null,bg=null;
  if(wok.burnt){ txt='탔어요! 탭해서 버리기'; bg='#5a4a44'; }
  else if(wokReady()){ txt='완성! 탭해서 담기'; bg='#2ea86a'; }
  else if(!wok.has.rice){ txt='흰밥부터 넣어요'; bg='#c9781f'; }
  else if(wok.fry<WFRY_PS){ txt='탭해서 더 볶기'; bg='#3aa0e0'; }
  else if(wok.fry>WFRY_PE){ txt='너무 볶았어요!'; bg='#d0402e'; }
  if(txt) bubble(cx,cy-gr-16,txt,bg);
}
function toPlay(){ state='play'; }
function levelClear(){ state='clear'; setSizzle(0); S.win(); mascot.mood='happy'; say('클리어!'); }
function gameOver(){ state='over'; setSizzle(0); S.lose(); mascot.mood='sad'; say('시간 종료…'); }
function winGame(){ state='win'; setSizzle(0); S.win(); mascot.mood='happy'; say('사장님 인정!'); }

function handleButtons(p){ for(const b of buttons){ if(p.x>b.x&&p.x<b.x+b.w&&p.y>b.y&&p.y<b.y+b.h){ S.btn(); b.fn(); return; } } }

/* ---------- 업데이트 ---------- */
let last=now();
function update(dt){
  mascot.t-=dt; if(mascot.t<=0) mascot.mood='idle';
  mascot.sayT-=dt; if(mascot.sayT<=0) mascot.say='';
  if(shake>0) shake=Math.max(0,shake-dt*40);
  for(const f of floats){ f.t+=dt; f.y-=dt*40; }
  floats=floats.filter(f=>f.t<1.1);
  for(const pt of parts){ pt.t+=dt;
    if(pt.kind==='steam'){ pt.y+=pt.vy*dt; pt.x=pt.x0+Math.sin(pt.t*3+pt.ph)*10*pt.sw; pt.r+=dt*9; }
    else { pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy+=pt.g*dt; if(pt.kind==='smoke') pt.r+=dt*10; } }
  parts=parts.filter(pt=>pt.t<pt.life);

  if(state==='intro'){ introT+=dt; if(introT>1.7) toPlay(); }

  if(state==='play'){
    timeLeft-=dt;
    if(friedMode()){ updateWok(dt); } else {
    let cooking=0;
    for(const p of pieces){
      if(p.pop>0) p.pop=Math.max(0,p.pop-dt*3);
      if(p.serveAnim>0){ p.serveAnim+=dt*3.2; p.x=lerp(p.sx,PLATE.x,clamp(p.serveAnim,0,1)); p.y=lerp(p.sy,PLATE.y,clamp(p.serveAnim,0,1)); continue; }
      if(p.dragging||!p.onGrill||p.burnt) continue;
      cooking++;
      const m=MEAT[p.type];
      if(!p.flipped){ p.d1+=dt; if(p.d1>=m.burnt){ p.burnt=true; onBurn(p);} }
      else { p.d2+=dt; if(p.d2>=m.burnt){ p.burnt=true; onBurn(p);} }
      const cur=p.flipped?p.d2:p.d1;
      if(Math.random()<dt*7) parts.push(sizzP(p.x+rand(-20,20),p.y+rand(-4,12)));
      if(cur>0.9 && Math.random()<dt*3.5) parts.push(steam(p.x+rand(-14,14),p.y-8));
      if(cur>m.perfect[1] && Math.random()<dt*3) parts.push(smoke(p.x+rand(-14,14),p.y-10));
    }
    // 지글지글 사운드 (굽는 양에 비례)
    if(cooking>0){ setSizzle(clamp(0.42+cooking*0.14,0.42,1)); if(Math.random()<dt*(4+cooking*1.5)) crackle(); }
    else setSizzle(0);
    }
    for(const p of pieces){ if(p.serveAnim>=1){ if(p.plate) addPlateItem(p.type); removePiece(p); } }
    if(timeLeft<=0){ timeLeft=0; if(score>=target) levelClear(); else gameOver(); }  // 시간 종료 시 누적점수로 판정
  } else { setSizzle(0); }
}

function draw(){
  ctx.clearRect(0,0,W,H); ctx.save();
  if(shake>0) ctx.translate(rand(-shake,shake),rand(-shake,shake));
  drawBackground();
  if(state==='play'||state==='clear'||state==='over'||state==='win'){
    drawGrill(); if(friedMode()) drawWokContents(); drawTrash(); drawPlate(); drawTray();
    const sorted=pieces.slice().sort((a,b)=>(a.dragging?1e6:a.y)-(b.dragging?1e6:b.y));
    for(const p of sorted) drawPiece(p);
    drawParticles();
    for(const f of floats) drawFloat(f);
    drawHUD();
  }
  drawMascot();
  ctx.restore();
  buttons=[];
  if(state==='start') drawStart();
  else if(state==='intro') drawIntro();
  else if(state==='clear') drawClear();
  else if(state==='over') drawOver();
  else if(state==='win') drawWin();
  if(state==='play') drawAdminBtn();

}

function drawPlate(){
  const st=(LEVELS[levelIdx]&&LEVELS[levelIdx].grill)||'griddle';
  const round=(st==='mesh'||st==='pan'||st==='wok');
  let rim='#ffd7de'; if(st==='grate')rim='#ffdca6'; else if(st==='mesh')rim='#bfe0ff'; else if(st==='pan')rim='#ffcf9e'; else if(st==='wok')rim='#ffe0b0';
  const W2=PLATE.w/2, H2=PLATE.h/2;
  const shape=(oy,ex,ey)=>{ if(round){ ctx.beginPath(); ctx.ellipse(0,oy,ex,ey,0,0,Math.PI*2); } else { rr(-ex,oy-ey,ex*2,ey*2,24); } };
  ctx.save(); ctx.translate(PLATE.x,PLATE.y);
  shape(7,W2,H2); ctx.fillStyle='rgba(120,70,40,.16)'; ctx.fill();
  shape(0,W2,H2); ctx.fillStyle='#ffffff'; ctx.fill();
  shape(0,W2-8,H2-8); ctx.strokeStyle=rim; ctx.lineWidth=6; ctx.stroke();
  shape(0,W2-20,H2-20); ctx.strokeStyle='#f0f0f6'; ctx.lineWidth=2; ctx.stroke();
  drawPlateGarnish(st,W2,H2);
  // 담긴 고기 (구운 크기 그대로, 접시 안으로 클립)
  ctx.save(); shape(0,W2-9,H2-9); ctx.clip();
  // 종류별로 묶고, 한 줄에 3개씩 세워 담기 (많이 안 겹치게)
  const groups=[], gi={};
  for(const it of plateItems){ if(gi[it.type]===undefined){ gi[it.type]=groups.length; groups.push([]); } groups[gi[it.type]].push(it); }
  const perRow=portrait?6:2;   // 모바일: 종류별로 한 줄에 6개까지
  const rowsArr=[];
  for(const grp of groups){ for(let i=0;i<grp.length;i+=perRow) rowsArr.push(grp.slice(i,i+perRow)); }
  const nrows=Math.max(rowsArr.length,1), rowH=Math.min(portrait?74:60,(PLATE.h-30)/nrows), cyBase=-(nrows-1)*rowH/2;
  const step=portrait?100:56;
  const isc=portrait? Math.max(0.66, Math.min(1.06, rowH/64)) : 0.78;   // 줄 수에 맞춰 크기 조정
  for(let r=0;r<rowsArr.length;r++){ const row=rowsArr[r], cy=cyBase+r*rowH;
    const cnt=row.length, sx=-(cnt-1)*step/2;   // 같은 줄 재료 살짝 겹침
    for(let j=0;j<cnt;j++){ const it=row[j];
      ctx.save(); ctx.translate(sx+j*step, cy); ctx.scale(isc,isc); ctx.rotate(it.rot*0.4);
      ctx.fillStyle='rgba(70,40,20,.16)'; ctx.beginPath(); ctx.ellipse(0,18,36,9,0,0,Math.PI*2); ctx.fill();
      drawIconCentered(it.type, MEAT[it.type].perfect[1], true, false); ctx.restore(); }
  }
  ctx.restore();
  if(plateItems.length===0){ ctx.fillStyle='#c98f6a'; ctx.font='16px Jua,sans-serif'; ctx.textAlign='center'; ctx.fillText('구운 고기',0,-8); ctx.fillText('여기 담기',0,15); }
  ctx.restore();
}

function drawPiece(p){
  const m=MEAT[p.type]; const cur=p.flipped?p.d2:p.d1; const dmax=Math.max(p.d1,p.d2);
  // 따뜻한 림 글로우 (굽는 중)
  if(p.onGrill && !p.dragging && !p.burnt){
    const inPerfect=cur>=m.perfect[0]&&cur<=m.perfect[1];
    const gr=56*ISCALE;
    const gl=ctx.createRadialGradient(p.x,p.y+6,6,p.x,p.y+6,gr);
    gl.addColorStop(0,'rgba(255,150,55,'+(inPerfect?0.55:0.32)+')'); gl.addColorStop(1,'rgba(255,150,55,0)');
    ctx.fillStyle=gl; circle(p.x,p.y+6,gr); ctx.fill();
  }
  ctx.save(); ctx.translate(p.x,p.y);
  const s=(1+(p.pop*0.25)+(p.dragging?0.06:0))*ISCALE; ctx.scale(s,s); ctx.rotate(p.angle);
  ctx.fillStyle='rgba(70,40,20,.22)'; ctx.beginPath(); ctx.ellipse(0,32,44,12,0,0,Math.PI*2); ctx.fill();
  drawIconCentered(p.type,dmax,p.flipped,p.burnt);
  ctx.restore();
  if(p.onGrill && !p.dragging && p.serveAnim<=0) drawGauge(p,cur,m);
}
function drawGauge(p,cur,m){
  const R=42*ISCALE, x=p.x, y=p.y; const frac=clamp(cur/m.burnt,0,1);
  ctx.beginPath(); ctx.arc(x,y,R,-Math.PI/2,-Math.PI/2+Math.PI*2); ctx.strokeStyle='rgba(0,0,0,.16)'; ctx.lineWidth=5*ISCALE; ctx.stroke();
  const ps=m.perfect[0]/m.burnt, pe=m.perfect[1]/m.burnt;
  ctx.beginPath(); ctx.arc(x,y,R,-Math.PI/2+Math.PI*2*ps,-Math.PI/2+Math.PI*2*pe); ctx.strokeStyle='rgba(79,208,138,.4)'; ctx.lineWidth=11*ISCALE; ctx.stroke();
  let col='#7fb8e0'; if(frac<ps) col='#7fb8e0'; else if(frac<=pe) col='#4fd08a'; else col=mix('#ffd24d','#ff5a3c',(frac-pe)/(1-pe)); if(p.burnt) col='#3a3a3a';
  ctx.beginPath(); ctx.arc(x,y,R,-Math.PI/2,-Math.PI/2+Math.PI*2*frac); ctx.strokeStyle=col; ctx.lineWidth=5*ISCALE; ctx.lineCap='round'; ctx.stroke();
  let txt=null,bg=null;
  if(p.burnt){ txt='탔다!'; bg='#5a4a44'; }
  else if(!p.flipped && frac>=ps){ txt='뒤집기!'; bg='#3aa0e0'; }
  else if(p.flipped && frac>=ps && frac<=pe){ txt='완성!'; bg='#2ea86a'; }
  else if(frac>pe){ txt='오버쿡!'; bg='#d0402e'; }
  if(txt) bubble(x,y-R-15,txt,bg);
}
function bubble(x,y,txt,bg){
  ctx.font='15px Jua,sans-serif'; ctx.textAlign='center'; const w=ctx.measureText(txt).width+20;
  rr(x-w/2,y-15,w,26,13); ctx.fillStyle=bg; ctx.fill();
  ctx.beginPath(); ctx.moveTo(x-6,y+10); ctx.lineTo(x+6,y+10); ctx.lineTo(x,y+18); ctx.closePath(); ctx.fillStyle=bg; ctx.fill();
  ctx.fillStyle='#ffffff'; ctx.fillText(txt,x,y+3);
}

/* 공용 렌더 헬퍼 */
function searMarks(w,h,cookT,flipped){

}
function gloss(cookT,charT,w,h){ ctx.save();

  ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(-w*0.12,-h*0.2,w*0.32,h*0.2,-0.4,0,Math.PI*2); ctx.fill();

function drawShrimp(col,edge,cookT,charT,m){
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
  const C={x:0,y:2}, Rc=23, a0=Math.PI*0.14, a1=Math.PI*1.5, N=16;
  const Wf=t=>3+12*Math.pow(Math.sin(Math.PI*t),0.8);   // 머리·꼬리로 갈수록 가늘게
  const T=[],B=[];
  for(let i=0;i<=N;i++){ const t=i/N, a=a0+(a1-a0)*t, w=Wf(t);
    const cx=C.x+Math.cos(a)*Rc, cy=C.y+Math.sin(a)*Rc, nx=Math.cos(a), ny=Math.sin(a);
    T.push([cx+nx*w,cy+ny*w]); B.push([cx-nx*w,cy-ny*w]); }
  const head=[C.x+Math.cos(a1)*Rc, C.y+Math.sin(a1)*Rc];

  const bodyPath=()=>{ ctx.beginPath(); ctx.moveTo(T[0][0],T[0][1]); for(let i=1;i<=N;i++) ctx.lineTo(T[i][0],T[i][1]); for(let i=N;i>=0;i--) ctx.lineTo(B[i][0],B[i][1]); ctx.closePath(); };
  const g=ctx.createLinearGradient(-24,-24,24,24); g.addColorStop(0,mix(col,'#ffffff',0.3)); g.addColorStop(1,col);
  bodyPath(); ctx.fillStyle=g; ctx.fill();
  bodyPath(); ctx.lineWidth=2.2; ctx.strokeStyle=mix(col,'#8a3a1e',0.45); ctx.stroke();
  // 마디
  ctx.strokeStyle='rgba(150,60,28,'+0.5*(1-charT)+')'; ctx.lineWidth=2;
  for(let i=4;i<N-1;i+=2){ ctx.beginPath(); ctx.moveTo(T[i][0],T[i][1]); ctx.lineTo(B[i][0],B[i][1]); ctx.stroke(); }
  // 꼬리 부채 (뾰족하게 퍼짐)
  const tc=mix('#ff9d6a','#4a2a1c',charT); ctx.fillStyle=tc;
  ctx.beginPath(); ctx.moveTo(tail[0],tail[1]);
  ctx.lineTo(tail[0]+21,tail[1]-13); ctx.lineTo(tail[0]+16,tail[1]-4);
  ctx.lineTo(tail[0]+26,tail[1]+2); ctx.lineTo(tail[0]+17,tail[1]+7);
  ctx.lineTo(tail[0]+21,tail[1]+18); ctx.lineTo(tail[0]+10,tail[1]+12);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle=mix(tc,'#7a3016',0.5); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(tail[0]+4,tail[1]); ctx.lineTo(tail[0]+21,tail[1]-9); ctx.moveTo(tail[0]+5,tail[1]+2); ctx.lineTo(tail[0]+24,tail[1]+2); ctx.moveTo(tail[0]+4,tail[1]+4); ctx.lineTo(tail[0]+18,tail[1]+13); ctx.stroke();
  // 머리: 뾰족한 뿔 + 더듬이 + 눈
  ctx.fillStyle=mix(col,'#8a3a1e',0.3);
  ctx.beginPath(); ctx.moveTo(head[0]-4,head[1]-1); ctx.lineTo(head[0]+13,head[1]-20); ctx.lineTo(head[0]+4,head[1]-3); ctx.closePath(); ctx.fill();
  ctx.strokeStyle=mix(col,'#c07040',0.42); ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(head[0]+2,head[1]-2); ctx.quadraticCurveTo(head[0]+24,head[1]-24,head[0]+40,head[1]-16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(head[0]-3,head[1]-1); ctx.quadraticCurveTo(head[0]-20,head[1]-16,head[0]-32,head[1]-4); ctx.stroke();
  ctx.fillStyle='#2e1e16'; circle(head[0]+4,head[1]-4,3.2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.9)'; circle(head[0]+3,head[1]-5,1.1); ctx.fill();
  // 광택
  ctx.globalAlpha=clamp(0.3+cookT*0.4-charT*0.5,0,0.55); ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.ellipse(-5,-11,9,4,-0.5,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  ctx.restore();
}

  else if(mascot.mood==='sad'){ ctx.beginPath(); ctx.arc(-12,0,3.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(12,0,3.5,0,Math.PI*2); ctx.fill();
    ctx.lineWidth=3; ctx.strokeStyle='#5a3d30'; ctx.beginPath(); ctx.arc(0,16,7,Math.PI,0,true); ctx.stroke();
    ctx.fillStyle='#7fc0e8'; ctx.beginPath(); ctx.moveTo(20,2); ctx.quadraticCurveTo(24,10,20,12); ctx.quadraticCurveTo(16,10,20,2); ctx.fill(); }
  else { ctx.beginPath(); ctx.arc(-12,0,3.6,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(12,0,3.6,0,Math.PI*2); ctx.fill();
    ctx.lineWidth=3; ctx.strokeStyle='#5a3d30'; ctx.beginPath(); ctx.moveTo(-6,10); ctx.lineTo(6,10); ctx.stroke(); }
  ctx.restore();
  if(mascot.say){ ctx.save(); ctx.font='15px Jua,sans-serif'; ctx.textAlign='center';
    const w=ctx.measureText(mascot.say).width+24, bx=x-w/2, by=y-58;
    rr(bx,by,w,30,14); ctx.fillStyle='#fffef8'; ctx.fill(); ctx.strokeStyle='#ffd0a0'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-6,by+30); ctx.lineTo(x+6,by+30); ctx.lineTo(x,by+40); ctx.closePath(); ctx.fillStyle='#fffef8'; ctx.fill();
    ctx.fillStyle='#7a5540'; ctx.fillText(mascot.say,x,by+20); ctx.restore(); }
}

/* ---------- 오버레이 ---------- */
function dim(a){ ctx.fillStyle='rgba(40,20,10,'+(a||0.45)+')'; ctx.fillRect(0,0,W,H); }
function bigCard(cy){ const w=560,h=300,x=W/2-w/2,y=cy||H/2-150; rr(x,y,w,h,28); ctx.fillStyle='#fffdf7'; ctx.fill(); ctx.strokeStyle='#ffcf9e'; ctx.lineWidth=5; ctx.stroke(); }
function btn(cx,cy,w,h,label,color,fn){ const x=cx-w/2,y=cy-h/2; rr(x,y+4,w,h,16); ctx.fillStyle='rgba(0,0,0,.12)'; ctx.fill();
  rr(x,y,w,h,16); ctx.fillStyle=color; ctx.fill(); ctx.fillStyle='#ffffff'; ctx.font='24px Jua,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label,cx,cy); ctx.textBaseline='alphabetic'; buttons.push({x,y,w,h,fn}); }
function drawStart(){
  const top=H/2-150;   // 세로/가로 모두 화면 중앙에 카드 배치
  dim(0.35); bigCard(top); ctx.textAlign='center';
  ctx.fillStyle='#ff6f4e'; ctx.font='52px Jua,sans-serif'; ctx.fillText('불판마스터',W/2,top+88);
  ctx.fillStyle='#c9781f'; ctx.font='24px Jua,sans-serif'; ctx.fillText('삼겹살 굽기 · 프로토타입',W/2,top+125);
  ctx.fillStyle='#7a5540'; ctx.font='16px Jua,sans-serif';
  ctx.fillText('불판 아무 곳에나 자유롭게 올리고, 익으면 탭해서 뒤집기',W/2,top+165);
  ctx.fillText('노릇할 때 접시로 드래그! (소리를 켜면 지글지글 🔊)',W/2,top+190);
  btn(W/2,top+245,220,64,'게임 시작','#ff7a4d',()=>{ startLevel(0); });
  ctx.fillStyle='#b98a5a'; ctx.font='13px Jua,sans-serif'; ctx.fillText('made for 세연 · 포레테 미니게임',W/2,top+292);
}
function drawIntro(){
  dim(0.4); const L=LEVELS[levelIdx]; ctx.textAlign='center';
  ctx.fillStyle='#ffffff'; ctx.font='30px Jua,sans-serif'; ctx.fillText('LEVEL '+L.n,W/2,H/2-70);
  ctx.fillStyle='#ffd15a'; ctx.font='46px Jua,sans-serif'; ctx.fillText(L.name,W/2,H/2-16);
  const n=L.meats.length, gap=Math.min(120,420/n);
  ctx.fillStyle='#ffffff'; ctx.font='16px Jua,sans-serif'; ctx.fillText('이번 판 재료',W/2,H/2+24);
  for(let i=0;i<n;i++){ const cx=W/2-(n-1)*gap/2+i*gap, cy=H/2+64; circle(cx,cy,30); ctx.fillStyle='#ffffff'; ctx.fill();
    ctx.save(); ctx.translate(cx,cy); ctx.scale(0.66,0.66); drawIconCentered(L.meats[i],0,false,false); ctx.restore();
    ctx.fillStyle='#ffffff'; ctx.font='13px Jua,sans-serif'; ctx.fillText(MEAT[L.meats[i]].name,cx,cy+48); }
  ctx.fillStyle='#ffe3c9'; ctx.font='18px Jua,sans-serif'; ctx.fillText('목표 '+LMETA[levelIdx].target+'점 · 제한 '+LMETA[levelIdx].time+'초',W/2,H/2+128);
}
// ===== 축하/배고픔 연출 헬퍼 =====
function bigCardWH(cx,cy,w,h){ const x=cx-w/2,y=cy-h/2; rr(x,y+6,w,h,30); ctx.fillStyle='rgba(0,0,0,.16)'; ctx.fill();
  rr(x,y,w,h,30); ctx.fillStyle='#fffdf7'; ctx.fill(); ctx.strokeStyle='#ffcf9e'; ctx.lineWidth=5; ctx.stroke();
  rr(x+6,y+6,w-12,h-12,24); ctx.strokeStyle='#fff2df'; ctx.lineWidth=2; ctx.stroke(); return {x,y,w,h}; }
function sparkleStar(x,y,r){                       // 반짝이 4각별 (결정론적으로 호출)
  ctx.save(); ctx.translate(x,y); ctx.beginPath();
  ctx.moveTo(0,-r); ctx.quadraticCurveTo(0,0,r,0); ctx.quadraticCurveTo(0,0,0,r);
  ctx.quadraticCurveTo(0,0,-r,0); ctx.quadraticCurveTo(0,0,0,-r); ctx.closePath();
  ctx.fillStyle='#fff6c8'; ctx.fill();
  ctx.beginPath(); ctx.arc(0,0,r*0.28,0,Math.PI*2); ctx.fillStyle='#ffffff'; ctx.fill(); ctx.restore(); }
function drawConfetti(x,y,w,h){                    // 카드 상단 색종이 (prr 고정)
  const cols=['#ff7a4d','#ffce4d','#5ac86a','#ff5d8f','#5aa9ff','#c07aff'];
  for(let i=0;i<24;i++){ const px=x+prr(i*7+1,6,w-6), py=y+prr(i*5+2,4,h-4);
    const pw=prr(i*3+4,6,12), ph=prr(i*4+6,8,15), rot=prr(i*9+3,-1.2,1.2);
    ctx.save(); ctx.translate(px,py); ctx.rotate(rot); ctx.globalAlpha=0.92;
    ctx.fillStyle=cols[i%cols.length]; ctx.fillRect(-pw/2,-ph/2,pw,ph); ctx.restore(); }
  ctx.globalAlpha=1; }
function drawCookedSpread(cx,cy,maxW,maxH,types){  // 여태 구운 재료를 맛있게 진열
  if(!types||!types.length){ ctx.fillStyle='#c98f6a'; ctx.font='18px Jua,sans-serif'; ctx.textAlign='center';
    ctx.fillText('아직 구운 재료가 없어요',cx,cy); return; }
  const n=types.length, perRow=Math.min(n, n<=4?n:(n<=10?5:6));
  const rows=Math.ceil(n/perRow);
  const cell=Math.min(104, maxW/perRow, (maxH||999)/rows), sc=cell/96*0.9;
  const startY=cy-(rows-1)*cell*0.5;
  for(let i=0;i<n;i++){ const r=Math.floor(i/perRow), c=i%perRow;
    const cnt=Math.min(perRow, n-r*perRow), startX=cx-(cnt-1)*cell*0.5;
    const px=startX+c*cell, py=startY+r*cell;
    ctx.save(); ctx.translate(px,py);
    ctx.fillStyle='rgba(70,40,20,.16)'; ctx.beginPath(); ctx.ellipse(0,cell*0.30,cell*0.34,cell*0.10,0,0,Math.PI*2); ctx.fill();
    ctx.scale(sc,sc); drawIconCentered(types[i], MEAT[types[i]].perfect[1], true, false); ctx.restore();
    sparkleStar(px+cell*0.30, py-cell*0.30, prr(i*11+1,5,9));
    sparkleStar(px-cell*0.33, py+cell*0.06, prr(i*13+5,3,6)); } }
function drawHungry(x,y,s){                         // 고기 못 먹어 배고픈 캐릭터
  ctx.save(); ctx.translate(x,y); ctx.scale(s,s);
  // 생각 풍선 (먹고 싶은 삼겹살)
  ctx.save(); ctx.translate(70,-58);
  ctx.fillStyle='#ffffff'; ctx.strokeStyle='#ffd7b0'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.ellipse(0,0,40,32,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(-34,26,8,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(-44,38,5,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.scale(0.42,0.42); drawIconCentered('samgyeopsal', MEAT.samgyeopsal.perfect[1], true, false); ctx.restore();
  // 몸통
  ctx.fillStyle='#f6c48c'; ctx.beginPath(); ctx.ellipse(0,26,50,46,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffe0b8'; ctx.beginPath(); ctx.ellipse(0,34,30,26,0,0,Math.PI*2); ctx.fill();
  // 꼬르륵 배 표시
  ctx.strokeStyle='#e58b5a'; ctx.lineWidth=2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-12,34); ctx.quadraticCurveTo(-6,40,0,34); ctx.quadraticCurveTo(6,40,12,34); ctx.stroke();
  // 얼굴
  ctx.fillStyle='#ffe6c4'; ctx.beginPath(); ctx.ellipse(0,-16,42,38,0,0,Math.PI*2); ctx.fill();
  // 귀
  ctx.beginPath(); ctx.arc(-40,-22,10,0,Math.PI*2); ctx.arc(40,-22,10,0,Math.PI*2); ctx.fill();
  // 볼 홍조
  ctx.fillStyle='rgba(255,150,120,.5)';
  ctx.beginPath(); ctx.ellipse(-25,-8,9,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(25,-8,9,6,0,0,Math.PI*2); ctx.fill();
  // 처진 눈
  ctx.strokeStyle='#5a4032'; ctx.lineWidth=3.4;
  ctx.beginPath(); ctx.moveTo(-27,-22); ctx.quadraticCurveTo(-17,-13,-8,-20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8,-20); ctx.quadraticCurveTo(17,-13,27,-22); ctx.stroke();
  // 눈물 한 방울
  ctx.fillStyle='#8bd6ff'; ctx.beginPath();
  ctx.moveTo(-24,-11); ctx.quadraticCurveTo(-29,-2,-24,3); ctx.quadraticCurveTo(-19,-2,-24,-11); ctx.fill();
  // 배고파 벌린 입 + 침
  ctx.fillStyle='#a8434a'; ctx.beginPath(); ctx.ellipse(0,2,9,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff9a9a'; ctx.beginPath(); ctx.ellipse(0,5,4.5,3,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#bfe8ff'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(7,7); ctx.quadraticCurveTo(9,15,7,20); ctx.stroke();
  ctx.restore(); }
function drawClear(){
  const last=(levelIdx>=LEVELS.length-1);
  dim(0.55); const cw=Math.min(640,W-40), ch=440, cy=H/2;
  const card=bigCardWH(W/2,cy,cw,ch); ctx.textAlign='center';
  drawConfetti(card.x+16, card.y+14, cw-32, 60);
  ctx.fillStyle='#2ea86a'; ctx.font='46px Jua,sans-serif';
  ctx.fillText(last?'전 코스 완주! 🎉':'레벨 클리어! 🎉', W/2, card.y+78);
  ctx.fillStyle='#5a4032'; ctx.font='21px Jua,sans-serif';
  ctx.fillText('누적 '+score+'점 · 목표 '+target+' · 최고콤보 x'+bestCombo, W/2, card.y+112);
  ctx.fillStyle='#e08a3a'; ctx.font='20px Jua,sans-serif';
  ctx.fillText('여태 구운 맛있는 것들 🤤', W/2, card.y+146);
  drawCookedSpread(W/2, card.y+254, cw-70, 196, cookedTypes);
  if(last) btn(W/2, card.y+ch-46, 250,64,'결과 보기 🏅','#2ea86a',()=>{ winGame(); });
  else     btn(W/2, card.y+ch-46, 270,64,'다음 레벨 ▶','#ff7a4d',()=>{ startLevel(levelIdx+1); });
}
function drawOver(){
  dim(0.6); const cw=Math.min(560,W-40), ch=400, cy=H/2;
  const card=bigCardWH(W/2,cy,cw,ch); ctx.textAlign='center';
  ctx.fillStyle='#e0483a'; ctx.font='42px Jua,sans-serif'; ctx.fillText('시간 종료… 😢', W/2, card.y+66);
  ctx.fillStyle='#5a4032'; ctx.font='21px Jua,sans-serif'; ctx.fillText(score+' / '+target+'점 (목표 미달)', W/2, card.y+100);
  drawHungry(W/2, card.y+218, 1.15);
  ctx.fillStyle='#b5642f'; ctx.font='19px Jua,sans-serif';
  ctx.fillText('고기를 못 먹어서 배고파요… 꼬르륵', W/2, card.y+ch-96);
  btn(W/2-132, card.y+ch-44, 236,58,'다시 도전','#ff7a4d',()=>{ startLevel(levelIdx); });
  btn(W/2+132, card.y+ch-44, 236,58,'처음으로','#cc9988',()=>{ score=0; state='start'; });
}
function drawWin(){
  dim(0.55); const cw=Math.min(660,W-40), ch=470, cy=H/2;
  const card=bigCardWH(W/2,cy,cw,ch); ctx.textAlign='center';
  drawConfetti(card.x+16, card.y+14, cw-32, 66);
  ctx.fillStyle='#ff7a4d'; ctx.font='46px Jua,sans-serif'; ctx.fillText('사장님 인정! 🏅', W/2, card.y+80);
  ctx.fillStyle='#c9781f'; ctx.font='22px Jua,sans-serif'; ctx.fillText('불판마스터 전 코스 클리어 · 최종 '+score+'점', W/2, card.y+114);
  ctx.fillStyle='#e08a3a'; ctx.font='21px Jua,sans-serif'; ctx.fillText('오늘의 완벽한 상차림 🤤', W/2, card.y+150);
  drawCookedSpread(W/2, card.y+266, cw-70, 210, cookedTypes);
  btn(W/2, card.y+ch-46, 250,64,'다시 하기 ▶','#ff7a4d',()=>{ score=0; startLevel(0); });
}
function drawAdminBtn(){
  const b=ADMIN;
  rr(b.x,b.y+3,b.w,b.h,14); ctx.fillStyle='rgba(0,0,0,.12)'; ctx.fill();
  rr(b.x,b.y,b.w,b.h,14); ctx.fillStyle='rgba(74,60,96,.94)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.45)'; ctx.lineWidth=1.4; ctx.stroke();
  ctx.fillStyle='#ffe29a'; ctx.font='13px Jua,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('관리자 · 다음레벨 ▶▶', b.x+b.w/2, b.y+b.h/2+1); ctx.textBaseline='alphabetic';
}
function drawMute(){
  ctx.save(); ctx.translate(W-38,26);
  circle(0,0,18); ctx.fillStyle='rgba(255,255,255,.85)'; ctx.fill(); ctx.strokeStyle='#e2b48c'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#7a5540'; ctx.beginPath(); ctx.moveTo(-8,-4); ctx.lineTo(-2,-4); ctx.lineTo(4,-9); ctx.lineTo(4,9); ctx.lineTo(-2,4); ctx.lineTo(-8,4); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#7a5540'; ctx.lineWidth=2.4;
  if(muted){ ctx.beginPath(); ctx.moveTo(8,-7); ctx.lineTo(15,7); ctx.moveTo(15,-7); ctx.lineTo(8,7); ctx.stroke(); }
  else { ctx.beginPath(); ctx.arc(6,0,5,-0.9,0.9); ctx.stroke(); ctx.beginPath(); ctx.arc(6,0,9,-0.8,0.8); ctx.stroke(); }
  ctx.restore();
}

/* ---------- 모바일 / 방향 / 고해상도(HiDPI) 대응 ---------- */
let _layoutMode=null;
function remapPieces(){                 // 방향 전환 시 조각이 화면 밖으로 안 나가게
  drag=null;
  for(const p of pieces){ p.x=clamp(p.x,20,W-20); p.y=clamp(p.y,20,H-20); if(p.onGrill) clampToGrill(p); }
}
function fitCanvas(){
  const prev=_layoutMode;
  computeLayout();                      // 방향에 따라 W,H,존 재계산 (가로/세로)
  _layoutMode = portrait?'p':'l';
  const dpr = Math.max(1, Math.min(window.devicePixelRatio||1, 2));
  cv.width = Math.round(W*dpr); cv.height = Math.round(H*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);    // 논리 좌표=W×H, 백킹만 선명하게
  const vw=window.innerWidth, vh=window.innerHeight, sc=Math.min(vw/W, vh/H);
  cv.style.width  = Math.round(W*sc)+'px';   // 화면 안에 꼭 맞게(레터박스)
  cv.style.height = Math.round(H*sc)+'px';
  if(prev && prev!==_layoutMode) remapPieces();
}
fitCanvas();
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', ()=>setTimeout(fitCanvas,150));
/* 터치 하드닝: 핀치/더블탭 확대·롱프레스 메뉴·다중터치 스크롤 차단 */
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('gesturechange', e=>e.preventDefault());
document.addEventListener('dblclick', e=>e.preventDefault(), {passive:false});
document.addEventListener('contextmenu', e=>e.preventDefault());
document.addEventListener('touchmove', e=>{ if(e.touches && e.touches.length>1) e.preventDefault(); }, {passive:false});

/* ---------- 루프 ---------- */
function frame(){ const t=now(); let dt=(t-last)/1000; last=t; dt=Math.min(0.05,dt); update(dt); draw(); requestAnimationFrame(frame); }
cv.addEventListener('pointerdown',onDown,{passive:false});
window.addEventListener('pointermove',onMove,{passive:false});
window.addEventListener('pointerup',onUp,{passive:false});
window.addEventListener('pointercancel',e=>{ if(drag) onUp(e); });
requestAnimationFrame(frame);
})();
</script>
